apiVersion: v1
kind: Namespace
metadata:
  name: openclaw
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-env
  namespace: openclaw
type: Opaque
stringData:
  OPENCLAW_GATEWAY_TOKEN: "openclaw-k8s-local"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-bootstrap
  namespace: openclaw
data:
  run-openclaw.sh: |
    #!/bin/bash
    set -euo pipefail

    CONFIG_DIR="${HOME}/.openclaw"
    CONFIG_FILE="${CONFIG_DIR}/openclaw.json"

    mkdir -p "${CONFIG_DIR}"

    if [ ! -f "${CONFIG_FILE}" ]; then
      printf '%s\n' \
        '{' \
        '  "gateway": {' \
        '    "controlUi": {' \
        '      "dangerouslyAllowHostHeaderOriginFallback": true' \
        '    }' \
        '  },' \
        '  "browser": {' \
        '    "enabled": true,' \
        '    "defaultProfile": "local-browser",' \
        '    "remoteCdpTimeoutMs": 2000,' \
        '    "remoteCdpHandshakeTimeoutMs": 4000,' \
        '    "profiles": {' \
        '      "local-browser": {' \
        '        "cdpUrl": "http://browser:9223",' \
        '        "color": "#00AA00"' \
        '      }' \
        '    }' \
        '  }' \
        '}' > "${CONFIG_FILE}"
    fi

    exec openclaw gateway \
      --allow-unconfigured \
      --bind lan \
      --port 18789 \
      --token "${OPENCLAW_GATEWAY_TOKEN:-}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: browser-appuser
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-home
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 12Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-linuxbrew
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 12Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser
  template:
    metadata:
      labels:
        app: browser
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data && chown -R 1000:1000 /data"]
          volumeMounts:
            - name: appuser
              mountPath: /data
      containers:
        - name: browser
          image: ghcr.io/bugparty/browserdocker-chrome:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3389
              name: rdp
            - containerPort: 9223
              name: cdp
          readinessProbe:
            httpGet:
              path: /json/version
              port: 9223
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /json/version
              port: 9223
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: appuser
              mountPath: /home/appuser
      volumes:
        - name: appuser
          persistentVolumeClaim:
            claimName: browser-appuser
---
apiVersion: v1
kind: Service
metadata:
  name: browser
  namespace: openclaw
spec:
  type: ClusterIP
  selector:
    app: browser
  ports:
    - name: cdp
      port: 9223
      targetPort: 9223
---
apiVersion: v1
kind: Service
metadata:
  name: browser-rdp
  namespace: openclaw
spec:
  type: NodePort
  selector:
    app: browser
  ports:
    - name: rdp
      port: 3389
      targetPort: 3389
      nodePort: 30389
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-home-perms
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /home-data /brew-data && chown -R 1000:1000 /home-data /brew-data"]
          volumeMounts:
            - name: openclaw-home
              mountPath: /home-data
            - name: openclaw-linuxbrew
              mountPath: /brew-data
      containers:
        - name: openclaw
          image: ghcr.io/bugparty/browserdocker-openclaw:latest
          imagePullPolicy: Always
          args: ["bash", "/opt/openclaw/run-openclaw.sh"]
          env:
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
          envFrom:
            - secretRef:
                name: openclaw-env
          ports:
            - containerPort: 18789
              name: gateway
            - containerPort: 18790
              name: bridge
          startupProbe:
            tcpSocket:
              port: 18789
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: openclaw-linuxbrew
              mountPath: /home/linuxbrew
            - name: bootstrap
              mountPath: /opt/openclaw/run-openclaw.sh
              subPath: run-openclaw.sh
      volumes:
        - name: openclaw-home
          persistentVolumeClaim:
            claimName: openclaw-home
        - name: openclaw-linuxbrew
          persistentVolumeClaim:
            claimName: openclaw-linuxbrew
        - name: bootstrap
          configMap:
            name: openclaw-bootstrap
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  selector:
    app: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
    - name: bridge
      port: 18790
      targetPort: 18790
